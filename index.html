  let eventsCache  = [];
  let espnTeamsMap = {};

  // в”Җв”Җ Helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function showError(msg) { errorMsg.textContent = msg; errorDiv.style.display = 'block'; }
  function hideError()    { errorDiv.style.display = 'none'; }
  function setLoading(on) { loader.style.display = on ? 'block' : 'none'; }
  function oddsToProb(d)  { return 1 / d; }

  function getAvgProb(events, name) {
    let total = 0, count = 0;
    events.forEach(ev => {
      if (ev.home_team !== name && ev.away_team !== name) return;
      ev.bookmakers.forEach(bk => {
        const h2h = bk.markets.find(m => m.key === 'h2h');
        if (!h2h) return;
        const out = h2h.outcomes.find(o => o.name === name);
        if (out) { total += oddsToProb(out.price); count++; }
      });
    });
    return count > 0 ? total / count : null;
  }

  function populateTeams(events, staticTeams) {
    const teams = new Set(staticTeams || []);
    events.forEach(e => { teams.add(e.home_team); teams.add(e.away_team); });
    const sorted = [...teams].sort();
    [teamA, teamB].forEach(sel => {
      sel.innerHTML = '<option value="">вҖ” Elige un equipo вҖ”</option>';
      sorted.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        sel.appendChild(opt);
      });
      sel.disabled = false;
    });
  }

  // в”Җв”Җ ESPN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async function loadESPNTeams(leagueKey) {
    const m = ESPN_LEAGUE_MAP[leagueKey];
    if (!m) return;
    try {
      const res = await fetch(`${ESPN}/${m.sport}/${m.league}/teams?limit=100`);
      if (!res.ok) return;
      const data = await res.json();
      const list = data.sports?.[0]?.leagues?.[0]?.teams || data.teams || [];
      list.forEach(t => {
        const team = t.team || t;
        if (team.displayName && team.id)
          espnTeamsMap[team.displayName] = { id: team.id, logo: team.logos?.[0]?.href || '' };
      });
    } catch(e) {}
  }

  async function fetchESPNTeamData(leagueKey, teamName) {
    const m = ESPN_LEAGUE_MAP[leagueKey];
    if (!m) return null;
    let info = espnTeamsMap[teamName];
    if (!info) {
      const key = Object.keys(espnTeamsMap).find(k =>
        k.toLowerCase().includes(teamName.toLowerCase().split(' ').pop()) ||
        teamName.toLowerCase().includes(k.toLowerCase().split(' ').pop())
      );
      info = key ? espnTeamsMap[key] : null;
    }
    if (!info) return null;
    try {
      const [tRes, sRes] = await Promise.all([
        fetch(`${ESPN}/${m.sport}/${m.league}/teams/${info.id}`),
        fetch(`${ESPN}/${m.sport}/${m.league}/teams/${info.id}/schedule`)
      ]);
      const tData = tRes.ok ? await tRes.json() : null;
      const sData = sRes.ok ? await sRes.json() : null;
      let form = [];
      if (sData) {
        const played = (sData.events || []).filter(e => e.competitions?.[0]?.status?.type?.completed);
        form = played.slice(-5).map(e => {
          const comp = e.competitions[0];
          const mine = comp.competitors.find(c => c.team?.id === info.id);
          const opp  = comp.competitors.find(c => c.team?.id !== info.id);
          const ms = parseInt(mine?.score||0), os = parseInt(opp?.score||0);
          return { result: ms>os?'W':ms<os?'L':'D', score:`${ms}-${os}`, opponent: opp?.team?.shortDisplayName||'?', date: e.date?.substring(0,10) };
        });
      }
      const record = tData?.team?.record?.items?.[0];
      const stats  = {};
      record?.stats?.forEach(s => { stats[s.name] = s.value; });
      return { name: tData?.team?.displayName||teamName, logo: info.logo, wins: stats.wins??'вҖ”', losses: stats.losses??'вҖ”', pointsFor: stats.pointsFor??stats.avgPoints??'вҖ”', form };
    } catch(e) { return null; }
  }

  function renderTeamCard(data, teamName) {
    if (!data) return `<div class="team-card"><h3>${teamName}</h3><div style="color:#555;font-size:0.8rem">Sin datos ESPN para esta liga</div></div>`;
    const formHTML = data.form.length
      ? data.form.map(f=>`<div class="form-badge ${f.result}" title="${f.opponent} ${f.score} (${f.date})">${f.result}</div>`).join('')
      : '<span style="color:#555;font-size:0.78rem">Sin historial reciente</span>';
    const logo = data.logo ? `<img class="team-logo" src="${data.logo}" onerror="this.style.display='none'">` : '';
    return `<div class="team-card">
      <h3>${logo} ${data.name}</h3>
      <div class="section-title">Forma reciente</div>
      <div class="form-row">${formHTML}</div>
      <div class="section-title">Temporada</div>
      <div class="stat-row"><span>Victorias</span><span>${data.wins}</span></div>
      <div class="stat-row"><span>Derrotas</span><span>${data.losses}</span></div>
      ${data.pointsFor!=='вҖ”'?`<div class="stat-row"><span>Pts promedio</span><span>${typeof data.pointsFor==='number'?data.pointsFor.toFixed(1):data.pointsFor}</span></div>`:''}
    </div>`;
  }

  // в”Җв”Җ Sport select в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  sportSelect.addEventListener('change', function() {
    const sport = this.value;
    hideError();
    resultDiv.style.display  = 'none';
    espnPanel.style.display  = 'none';
    eventsCache  = [];
    espnTeamsMap = {};

    leagueSelect.innerHTML = '<option value="">вҖ” Elige una liga вҖ”</option>';
    leagueSelect.disabled  = !sport;

    teamA.innerHTML = '<option value="">вҖ” Primero elige liga вҖ”</option>';
    teamA.disabled  = true;
    teamB.innerHTML = '<option value="">вҖ” Primero elige liga вҖ”</option>';
    teamB.disabled  = true;
    predictBtn.disabled = true;

    if (!sport) return;
    (LEAGUES[sport] || []).forEach(function(l) {
      const opt = document.createElement('option');
      opt.value = l.key;
      opt.textContent = l.title;
      leagueSelect.appendChild(opt);
    });
  });

  // в”Җв”Җ League select в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  leagueSelect.addEventListener('change', async function() {
    const leagueKey = this.value;
    hideError();
    resultDiv.style.display = 'none';
    espnPanel.style.display = 'none';

    if (!leagueKey) {
      teamA.innerHTML = '<option value="">вҖ” Elige liga primero вҖ”</option>'; teamA.disabled = true;
      teamB.innerHTML = '<option value="">вҖ” Elige liga primero вҖ”</option>'; teamB.disabled = true;
      predictBtn.disabled = true;
      return;
    }

    teamA.innerHTML = '<option value="">вҖ” Cargando... вҖ”</option>'; teamA.disabled = true;
    teamB.innerHTML = '<option value="">вҖ” Cargando... вҖ”</option>'; teamB.disabled = true;
    predictBtn.disabled = true;
    setLoading(true);

    try {
      const sport        = sportSelect.value;
      const leagueConfig = (LEAGUES[sport] || []).find(function(l){ return l.key === leagueKey; });
      const staticTeams  = leagueConfig && leagueConfig.staticTeams ? leagueConfig.staticTeams : [];

      const [oddsRes] = await Promise.all([
        fetch(BASE + '/sports/' + leagueKey + '/odds/?apiKey=' + API_KEY + '&regions=eu&markets=h2h&oddsFormat=decimal'),
        loadESPNTeams(leagueKey)
      ]);

      const remaining = oddsRes.headers.get('x-requests-remaining');
      const used      = oddsRes.headers.get('x-requests-used');
      if (remaining !== null) quotaInfo.textContent = 'CrГ©ditos usados: ' + used + ' | Restantes: ' + remaining;

      let data = [];
      if (oddsRes.ok) { data = await oddsRes.json(); if (!Array.isArray(data)) data = []; }

      if (staticTeams.length === 0 && data.length === 0) {
        showError('No hay partidos disponibles para esta liga en este momento.');
        setLoading(false);
        return;
      }

      eventsCache = data;
      populateTeams(data, staticTeams);

    } catch(e) {
      showError('Error al conectar: ' + e.message);
    }
    setLoading(false);
  });

  // в”Җв”Җ Team selects в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  teamA.addEventListener('change', function() {
    hideError();
    const a = teamA.value, b = teamB.value;
    predictBtn.disabled = !(a && b && a !== b);
    if (a && b && a === b) showError('Debes elegir dos equipos distintos.');
  });
  teamB.addEventListener('change', function() {
    hideError();
    const a = teamA.value, b = teamB.value;
    predictBtn.disabled = !(a && b && a !== b);
    if (a && b && a === b) showError('Debes elegir dos equipos distintos.');
  });

  // в”Җв”Җ Predict в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  predictBtn.addEventListener('click', async function() {
    hideError();
    resultDiv.style.display = 'none';
    espnPanel.style.display = 'none';
    const tA = teamA.value, tB = teamB.value;
    if (!tA || !tB || tA === tB) { showError('Selecciona dos equipos distintos.'); return; }

    let rel = eventsCache.filter(function(e){
      return (e.home_team===tA&&e.away_team===tB)||(e.home_team===tB&&e.away_team===tA);
    });
    const direct = rel.length > 0;
    if (!direct) rel = eventsCache.filter(function(e){
      return e.home_team===tA||e.away_team===tA||e.home_team===tB||e.away_team===tB;
    });

    if (rel.length > 0) {
      const pAr = getAvgProb(rel, tA), pBr = getAvgProb(rel, tB);
      if (pAr !== null && pBr !== null) {
        const tot = pAr + pBr, pA = pAr/tot, pB = pBr/tot;
        const winner = pA >= pB ? tA : tB;
        const bks = new Set(); rel.forEach(function(e){ e.bookmakers.forEach(function(b){ bks.add(b.key); }); });
        document.getElementById('winnerName').textContent     = 'рҹҸҶ ' + winner;
        document.getElementById('bookmakerCount').textContent = 'Basado en ' + bks.size + ' casa' + (bks.size!==1?'s':'') + ' de apuestas В· ' + (direct?'Partido directo':'Rendimiento individual');
        document.getElementById('nameA').textContent = tA;
        document.getElementById('pctA').textContent  = Math.round(pA*100) + '%';
        document.getElementById('nameB').textContent = tB;
        document.getElementById('pctB').textContent  = Math.round(pB*100) + '%';
        document.getElementById('boxA').className    = 'prob-box' + (pA>=pB?' highlight':'');
        document.getElementById('boxB').className    = 'prob-box' + (pB>pA?' highlight':'');
        document.getElementById('barFill').style.width = Math.round(pA*100) + '%';
        resultDiv.style.display = 'block';
      }
    } else {
      showError('No hay odds activas para estos equipos.');
    }

    const leagueKey = leagueSelect.value;
    if (ESPN_LEAGUE_MAP[leagueKey]) {
      espnPanel.style.display = 'flex';
      espnGrid.innerHTML = '<div class="espn-loader">вҸі Cargando datos ESPN...</div>';
      const results = await Promise.all([fetchESPNTeamData(leagueKey,tA), fetchESPNTeamData(leagueKey,tB)]);
      espnGrid.innerHTML = renderTeamCard(results[0],tA) + renderTeamCard(results[1],tB);
    }
  });

}); // fin DOMContentLoaded
</script>
</body>
</html>
