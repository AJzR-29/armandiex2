  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;

      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #7f5af0, #2cb67d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #888; margin-bottom: 40px; font-size: 0.9rem; }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: block;
    }
    select {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f1a;
      border: 1px solid #3a3a5c;
      border-radius: 10px;
      color: #e0e0f0;
      font-size: 1rem;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { outline: none; border-color: #7f5af0; }
    select:disabled { opacity: 0.4; cursor: not-allowed; }
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: #7f5af0;
      pointer-events: none;
    }
    .teams-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    #predictBtn {
      padding: 14px;
      background: linear-gradient(135deg, #7f5af0, #2cb67d);
      border: none; border-radius: 10px;
      color: white; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    #predictBtn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #predictBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #result {
      display: none;
      background: #0f0f1a;
      border: 1px solid #3a3a5c;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    #result .winner { font-size: 1.6rem; font-weight: 700; color: #2cb67d; margin-bottom: 8px; }
    .prob-row { display: flex; justify-content: space-between; margin-top: 16px; gap: 12px; }
    .prob-box { flex: 1; background: #1a1a2e; border-radius: 10px; padding: 14px; border: 1px solid #2a2a4a; }
    .prob-box.highlight { border-color: #2cb67d; }
    .prob-box .team-name { font-size: 0.85rem; color: #aaa; margin-bottom: 4px; }
    .prob-box .pct { font-size: 1.5rem; font-weight: 700; color: #e0e0f0; }
    .prob-box.highlight .pct { color: #2cb67d; }
    .bar-wrap { background: #2a2a4a; border-radius: 999px; height: 8px; margin-top: 16px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #7f5af0, #2cb67d); border-radius: 999px; transition: width 0.6s ease; }
    #espnPanel { display: none; gap: 16px; flex-direction: column; }
    .espn-teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .team-card { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 12px; padding: 16px; }
    .team-card h3 { font-size: 0.95rem; color: #7f5af0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

    .form-row { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .form-badge { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
    .form-badge.W { background: #2cb67d22; color: #2cb67d; border: 1px solid #2cb67d; }
    .form-badge.L { background: #ff6b6b22; color: #ff6b6b; border: 1px solid #ff6b6b; }
    .form-badge.D { background: #ffd70022; color: #ffd700; border: 1px solid #ffd700; }
    .stat-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; padding: 4px 0; border-bottom: 1px solid #1a1a2e; }
    .stat-row span:last-child { color: #e0e0f0; font-weight: 600; }
    .section-title { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin: 8px 0 4px; }
    .espn-loader { text-align: center; color: #555; font-size: 0.85rem; padding: 12px; }
    #error { color: #ff6b6b; font-size: 0.85rem; text-align: center; display: none; }
    .loader { border: 3px solid #2a2a4a; border-top-color: #7f5af0; border-radius: 50%; width: 28px; height: 28px; animation: spin 0.7s linear infinite; margin: 0 auto; display: none; }

</head>
